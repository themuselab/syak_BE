name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests with coverage
        run: npm run test:coverage
        env:
          JWT_SECRET: ci-test-secret-minimum-32-chars!!
          INTERNAL_API_KEY: ci-internal-key
          COOKIE_SECURE: 'false'
          COOKIE_SAME_SITE: lax
          NODE_ENV: test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  e2e:
    name: E2E Tests (Docker PostgreSQL)
    runs-on: ubuntu-latest
    needs: test

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: syak
          POSTGRES_PASSWORD: syak_test_password
          POSTGRES_DB: syak_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run DB migrations
        run: psql $DATABASE_URL -f db/init.sql
        env:
          DATABASE_URL: postgresql://syak:syak_test_password@localhost:5432/syak_test

      - name: E2E tests
        run: npm run test:e2e
        env:
          # E2E: 두 풀 모두 같은 Docker PostgreSQL 사용 (모든 테이블 포함)
          DATABASE_URL: postgresql://syak:syak_test_password@localhost:5432/syak_test
          SUPABASE_DATABASE_URL: postgresql://syak:syak_test_password@localhost:5432/syak_test
          JWT_SECRET: ci-test-secret-minimum-32-chars!!
          INTERNAL_API_KEY: ci-internal-key
          COOKIE_SECURE: 'false'
          COOKIE_SAME_SITE: lax
          NODE_ENV: test

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test, e2e]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: syak-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
