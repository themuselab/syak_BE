name: Deploy to EC2

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/syak-backend:latest
            ghcr.io/${{ github.repository_owner }}/syak-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Blue-Green Deploy to EC2
        uses: appleboy/ssh-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
          IMAGE: ghcr.io/${{ github.repository_owner }}/syak-backend:${{ github.sha }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: GH_TOKEN,GH_ACTOR,IMAGE
          script: |
            echo "$GH_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin
            chmod +x ~/deploy.sh
            ~/deploy.sh "$IMAGE"

      - name: Clean up old GHCR images
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner.toLowerCase();
            const packageName = 'syak-backend';
            const keepShas = new Set([context.sha]);

            const { data: versions } = await github.rest.packages.getAllPackageVersionsForPackageOwnedByOrg({
              package_type: 'container',
              package_name: packageName,
              org: owner,
              per_page: 100,
            }).catch(() => ({ data: [] }));

            for (const v of versions) {
              const tags = v.metadata?.container?.tags ?? [];
              const isCurrent = tags.some(t => keepShas.has(t)) || tags.includes('latest');
              if (!isCurrent) {
                await github.rest.packages.deletePackageVersionForOrg({
                  package_type: 'container',
                  package_name: packageName,
                  org: owner,
                  package_version_id: v.id,
                }).catch(() => {});
                console.log(`Deleted version ${v.id} (tags: ${tags.join(', ') || 'none'})`);
              }
            }
