name: marketing-snapshot

on:
  schedule:
    - cron: "20 23 * * *" # 매일 08:20 KST (app 리포트 이후)
  workflow_dispatch: {} # 수동 실행

concurrency:
  group: marketing-snapshot
  cancel-in-progress: true

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 마케팅 성과 수집 → Gemini 조언 → Supabase 저장
        env:
          # 필수
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          # 인스타 (최초 1회만 필요 — 이후 Supabase에 자동 보관·갱신)
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          # 메타 광고 (선택)
          META_ADS_ACCESS_TOKEN: ${{ secrets.META_ADS_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
          # 쓰레드 (선택)
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          # AI 조언 (선택)
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-2.5-flash
          GRAPH_VERSION: v21.0
        run: node scripts/marketing/daily-snapshot.mjs
