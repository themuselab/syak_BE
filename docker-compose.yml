services:
  app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    # 컨테이너 내부에서는 localhost가 아니라 compose 서비스명으로 접속해야 함
    # (.env의 localhost 값은 호스트에서 백엔드를 네이티브로 돌릴 때 기준)
    environment:
      DATABASE_URL: postgresql://syak:syak_dev_password@db:5432/syak_dev
      SUPABASE_DATABASE_URL: postgresql://syak:syak_dev_password@db:5432/syak_dev
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: syak_dev
      POSTGRES_USER: syak
      POSTGRES_PASSWORD: syak_dev_password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U syak -d syak_dev"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  postgres_data:
  redis_data:
